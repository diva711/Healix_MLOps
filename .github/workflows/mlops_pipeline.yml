name: ML Pipeline

on: [push]

jobs:
  train-and-register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --no-cache-dir \
            pandas==2.2.1 \
            scikit-learn==1.4.1.post1 \
            mlflow==2.12.0 \
            dvc==3.51.2 \
            "dvc-s3==3.2.0" \
            fastapi==0.111.0 \
            uvicorn==0.29.0 \
            evidently==0.7.20

      - name: Pull Data from DVC
        run: |
          mkdir -p .dvc
          echo "[remote \"origin\"]" >> .dvc/config.local
          echo "    access_key_id = ${{ secrets.DAGSHUB_TOKEN }}" >> .dvc/config.local
          echo "    secret_access_key = ${{ secrets.DAGSHUB_TOKEN }}" >> .dvc/config.local
          dvc pull

      - name: Run Training and Registry
        run: python train.py 