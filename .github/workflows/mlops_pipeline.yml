name: ML Pipeline
on: [push] # This triggers the factory every time you push code

jobs:
  train-and-register:
    runs-on: ubuntu-latest # The 'Virtual Computer'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn mlflow dvc

      - name: Pull Data from DVC
        # In a real setup, you'd add your DVC remote credentials here
        run: |
          # dvc pull (omitted for now to keep it simple locally)
          echo "DVC would pull data.csv here"

      - name: Run Training and Registry
        run: python train.py